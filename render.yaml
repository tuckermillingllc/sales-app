services:
  - type: web
    name: sales-app-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
    rootDir: sales-app-backend

  - type: static
    name: sales-app-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sales-app-backend.onrender.com/api/v1
    rootDir: sales-app-frontend
